spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: rikser-security
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml
    drop-first: true
  cloud:
    compatibility-verifier:
      enabled: false

jwt:
  expirationTime: 3600000
  refreshExpirationTime: 2592000000
  privateKey: 
  publicKey: 

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

bundle:
  security:
    enabled: true
    service:
      enabled: false
      url: http://localhost:8081